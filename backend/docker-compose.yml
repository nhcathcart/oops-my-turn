services:
  # This is a simple noop container that blocks until the migrator container has completed.
  postgres_migrated:
    image: alpine:3.14
    depends_on:
      migrator:
        condition: service_completed_successfully
    command: echo "Migrations completed"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: starter
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U starter" ]
      interval: 1s
      timeout: 5s
      retries: 10

  migrator:
    depends_on:
      postgres:
        condition: service_healthy
    image: golang:1.25
    environment:
      DB_MIGRATIONS_ENABLED: true
      DB_HOST: 172.17.0.1
    volumes:
      - "./:/app"
    entrypoint: "/bin/sh -c"
    command:
      - cd /app && go run cmd/migrate/main.go
